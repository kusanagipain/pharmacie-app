const CITIES = [
  "Douala","Yaoundé","Bafoussam","Bamenda","Garoua","Maroua","Ngaoundéré","Bertoua","Ebolowa","Kribi","Limbé","Buea","Kumba"

const INITIAL_PHARMACIES = [
  { id:1, name:"Pharmacie Centrale Douala", address:"Rue de la Joie, Akwa", city:"Douala", phone:"237 6XX XX XX XX", hours:"07:00-22:00", onDuty:true, lat:4.0511, lng:9.7679, rating:4.8 },
  { id:2, name:"Pharmacie du Wouri", address:"Boulevard de la Liberté", city:"Douala", phone:"237 6XX XX XX XX", hours:"08:00-20:00", onDuty:false, lat:4.0480, lng:9.7050, rating:4.5 },
  { id:3, name:"Pharmacie Mvog-Ada", address:"Carrefour Mvog-Ada", city:"Yaoundé", phone:"237 6XX XX XX XX", hours:"08:00-21:00", onDuty:true, lat:3.8480, lng:11.5021, rating:4.7 },
  { id:4, name:"Pharmacie Bastos", address:"Quartier Bastos", city:"Yaoundé", phone:"237 6XX XX XX XX", hours:"07:30-20:00", onDuty:false, lat:3.8734, lng:11.5164, rating:4.6 },
  { id:5, name:"Pharmacie Bafoussam Centre", address:"Marché Central", city:"Bafoussam", phone:"237 6XX XX XX XX", hours:"08:00-20:00", onDuty:true, lat:5.4737, lng:10.4162, rating:4.4 },
  { id:6, name:"Pharmacie Santa Barbara", address:"Avenue Kennedy", city:"Bamenda", phone:"237 6XX XX XX XX", hours:"08:00-19:00", onDuty:false, lat:5.9597, lng:10.1459, rating:4.3 },
];

const PRODUCTS = [
  { id:1, name:"Paracétamol 500mg", category:"Antidouleur", image:"💊" },
  { id:2, name:"Ibuprofène 400mg", category:"Anti-inflammatoire", image:"💊" },
  { id:3, name:"Vitamine C 1000mg", category:"Vitamines", image:"🍊" },
  { id:4, name:"Sirop contre la toux", category:"Respiratoire", image:"🍯" },
  { id:5, name:"Masques chirurgicaux x50", category:"Protection", image:"😷" },
  { id:6, name:"Thermomètre digital", category:"Matériel", image:"🌡️" },
  { id:7, name:"Amoxicilline 500mg", category:"Antibiotique", image:"💊" },
  { id:8, name:"Sérum physiologique", category:"Soin", image:"💧" },
];

// ===================== APP =====================
const App = () => {
  const [lang, setLang] = useState('fr');
  const t = T[lang];
  const [screen, setScreen] = useState('login');
  const [menuOpen, setMenuOpen] = useState(false);
  const [page, setPage] = useState('home');
  const [cart, setCart] = useState([]);
  const [user, setUser] = useState(null);
  const [users, setUsers] = useState([]);
  const [pharmacies, setPharmacies] = useState(INITIAL_PHARMACIES);
  const [pharmacyFilter, setPharmacyFilter] = useState('all');
  const [searchQuery, setSearchQuery] = useState('');
  const [pharmacySearch, setPharmacySearch] = useState('');
  const [selectedCity, setSelectedCity] = useState('');
  const [userLocation, setUserLocation] = useState(null);
  const [locationStatus, setLocationStatus] = useState('idle');
  const [showRegisterPharmacy, setShowRegisterPharmacy] = useState(false);
  const [pharmacyRegistered, setPharmacyRegistered] = useState(null);
  const [showOrderConfirm, setShowOrderConfirm] = useState(false);
  const [showMapModal, setShowMapModal] = useState(null);
  const [showAddReminder, setShowAddReminder] = useState(false);
  const [reminders, setReminders] = useState([
    { id:1, name:'Paracétamol 500mg', dosage:'1 comprimé', times:['08:00','20:00'], days:['Lun','Mar','Mer','Jeu','Ven'], startDate:'2025-11-01', endDate:'2025-11-15', notes:'Avec repas', active:true }
  ]);
  const [newReminder, setNewReminder] = useState({ name:'', dosage:'', times:['08:00'], days:[], startDate:'', endDate:'', notes:'' });
  const [loginForm, setLoginForm] = useState({ email:'', password:'' });
  const [registerForm, setRegisterForm] = useState({ name:'', email:'', phone:'', city:'', password:'', confirm:'' });
  const [loginError, setLoginError] = useState('');
  const [registerError, setRegisterError] = useState('');
  const [pharmForm, setPharmForm] = useState({ name:'', address:'', city:'', phone:'', hours:'', lat:'', lng:'' });

  const daysOfWeek = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  // LOCATION
  const requestLocation = () => {
    setLocationStatus('loading');
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => { setUserLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setLocationStatus('granted'); },
        () => setLocationStatus('denied')
      );
    } else setLocationStatus('denied');
  };

  // AUTH
  const handleRegister = () => {
    if (!registerForm.name || !registerForm.email || !registerForm.phone || !registerForm.password) { setRegisterError(t.errorRequired); return; }
    if (registerForm.password !== registerForm.confirm) { setRegisterError(t.errorPassword); return; }
    if (users.find(u => u.email === registerForm.email)) { setRegisterError(t.errorEmail); return; }
    const u = { ...registerForm };
    setUsers([...users, u]);
    setUser(u);
    setScreen('home');
    setRegisterError('');
  };

  const handleLogin = () => {
    const found = users.find(u => u.email === loginForm.email && u.password === loginForm.password);
    if (!found) { setLoginError(t.errorLogin); return; }
    setUser(found);
    setScreen('home');
    setLoginError('');
  };

  const handleLogout = () => { setUser(null); setScreen('login'); setMenuOpen(false); setCart([]); };

  // CART
  const addToCart = (product, pharmacyId) => {
    const existing = cart.find(i => i.id === product.id);
    if (existing) setCart(cart.map(i => i.id === product.id ? {...i, quantity:i.quantity+1} : i));
    else setCart([...cart, {...product, quantity:1, pharmacyId}]);
  };
  const removeFromCart = (id) => setCart(cart.filter(i => i.id !== id));
  const updateQty = (id, qty) => { if (qty===0) removeFromCart(id); else setCart(cart.map(i => i.id===id ? {...i, quantity:qty} : i)); };
  const cartCount = cart.reduce((s,i)=>s+i.quantity,0);

  // PHARMACY REGISTER
  const handlePharmacyRegister = () => {
    if (!pharmForm.name || !pharmForm.phone || !pharmForm.city) return;
    const pwd = 'PH' + Math.random().toString(36).substring(2,8).toUpperCase();
    const newPh = {
      id: Date.now(), name: pharmForm.name, address: pharmForm.address,
      city: pharmForm.city, phone: pharmForm.phone, hours: pharmForm.hours || '08:00-20:00',
      onDuty: false, lat: parseFloat(pharmForm.lat)||3.848, lng: parseFloat(pharmForm.lng)||11.502, rating: 4.0
    };
    setPharmacies([...pharmacies, newPh]);
    setPharmacyRegistered(pwd);
    setPharmForm({ name:'', address:'', city:'', phone:'', hours:'', lat:'', lng:'' });
  };

  // REMINDERS
  const toggleDay = (day) => {
    const days = newReminder.days.includes(day) ? newReminder.days.filter(d=>d!==day) : [...newReminder.days, day];
    setNewReminder({...newReminder, days});
  };
  const addReminder = () => {
    if (!newReminder.name || !newReminder.startDate || !newReminder.endDate || newReminder.days.length===0) return;
    setReminders([...reminders, {...newReminder, id:Date.now(), active:true}]);
    setNewReminder({ name:'', dosage:'', times:['08:00'], days:[], startDate:'', endDate:'', notes:'' });
    setShowAddReminder(false);
  };

  // FILTERED PHARMACIES
  const filteredPharmacies = pharmacies.filter(ph => {
    const matchCity = selectedCity ? ph.city === selectedCity : true;
    const matchSearch = ph.name.toLowerCase().includes(pharmacySearch.toLowerCase()) || ph.city.toLowerCase().includes(pharmacySearch.toLowerCase());
    const matchDuty = pharmacyFilter === 'duty' ? ph.onDuty : true;
    return matchCity && matchSearch && matchDuty;
  });

  const navigate = (p) => { setPage(p); setMenuOpen(false); };

  // ===================== LOGIN =====================
  if (screen === 'login') return (
    <div className="min-h-screen bg-gradient-to-br from-green-600 to-green-800 flex items-center justify-center p-6">
      <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
        <div className="text-center mb-6">
          <div className="text-6xl mb-3">💊</div>
          <h1 className="text-2xl font-bold text-gray-800">{t.appName}</h1>
          <p className="text-gray-500 text-sm mt-1">Cameroun 🇨🇲</p>
        </div>
        <div className="flex gap-2 mb-6">
          <button onClick={()=>setLang('fr')} className={`flex-1 py-2 rounded-full text-sm font-semibold ${lang==='fr'?'bg-green-500 text-white':'bg-gray-100 text-gray-600'}`}>🇫🇷 Français</button>
          <button onClick={()=>setLang('en')} className={`flex-1 py-2 rounded-full text-sm font-semibold ${lang==='en'?'bg-green-500 text-white':'bg-gray-100 text-gray-600'}`}>🇬🇧 English</button>
        </div>
        {loginError && <div className="bg-red-50 text-red-600 p-3 rounded-xl mb-4 text-sm">{loginError}</div>}
        <div className="space-y-3">
          <input type="email" placeholder={t.email} value={loginForm.email} onChange={e=>setLoginForm({...loginForm,email:e.target.value})} className="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400" />
          <input type="password" placeholder={t.password} value={loginForm.password} onChange={e=>setLoginForm({...loginForm,password:e.target.value})} className="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400" />
          <button onClick={handleLogin} className="w-full bg-green-500 text-white py-4 rounded-2xl font-bold text-lg">{t.login}</button>
        </div>
        <p className="text-center mt-4 text-gray-600 text-sm">{t.noAccount} <button onClick={()=>{setScreen('register');setLoginError('');}} className="text-green-600 font-bold">{t.register}</button></p>
        <div className="border-t mt-4 pt-4">
          <button onClick={()=>setShowRegisterPharmacy(true)} className="w-full bg-blue-50 text-blue-600 py-3 rounded-2xl font-semibold text-sm">🏥 {t.registerPharmacy}</button>
        </div>
      </div>
      {/* Modal inscription pharmacie */}
      {showRegisterPharmacy && (
        <div className="fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
          <div className="bg-white rounded-3xl w-full max-w-sm p-6 max-h-[90vh] overflow-y-auto">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-xl font-bold text-gray-800">🏥 {t.registerPharmacy}</h2>
              <button onClick={()=>{setShowRegisterPharmacy(false);setPharmacyRegistered(null);}} className="text-gray-500 text-2xl">✕</button>
            </div>
            {pharmacyRegistered ? (
              <div className="text-center py-6">
                <div className="text-6xl mb-4">🎉</div>
                <p className="text-gray-700 mb-4">{t.pharmacySuccess}</p>
                <div className="bg-green-100 text-green-800 text-2xl font-bold py-4 rounded-2xl mb-4">{pharmacyRegistered}</div>
                <p className="text-sm text-gray-500">Notez bien ce mot de passe. Il vous sera demandé pour gérer votre pharmacie.</p>
                <button onClick={()=>{setShowRegisterPharmacy(false);setPharmacyRegistered(null);}} className="mt-4 w-full bg-green-500 text-white py-3 rounded-2xl font-bold">OK</button>
              </div>
            ) : (
              <div className="space-y-3">
                <input type="text" placeholder={`${t.pharmacyName} *`} value={pharmForm.name} onChange={e=>setPharmForm({...pharmForm,name:e.target.value})} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400" />
                <input type="text" placeholder={t.pharmacyAddress} value={pharmForm.address} onChange={e=>setPharmForm({...pharmForm,address:e.target.value})} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400" />
                <select value={pharmForm.city} onChange={e=>setPharmForm({...pharmForm,city:e.target.value})} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400">
                  <option value="">{t.pharmacyCity} *</option>
                  {CITIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <input type="tel" placeholder={`${t.pharmacyPhone} * (ex: 237 6XX XX XX XX)`} value={pharmForm.phone} onChange={e=>setPharmForm({...pharmForm,phone:e.target.value})} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400" />
                <input type="text" placeholder={`${t.pharmacyHours} (ex: 08:00-20:00)`} value={pharmForm.hours} onChange={e=>setPharmForm({...pharmForm,hours:e.target.value})} className="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400" />
                <div className="grid grid-cols-2 gap-2">
                  <input type="number" placeholder={t.pharmacyLat} value={pharmForm.lat} onChange={e=>setPharmForm({...pharmForm,lat:e.target.value})} className="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400" />
                  <input type="number" placeholder={t.pharmacyLng} value={pharmForm.lng} onChange={e=>setPharmForm({...pharmForm,lng:e.target.value})} className="p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400" />
                </div>
                <button onClick={handlePharmacyRegister} disabled={!pharmForm.name||!pharmForm.phone||!pharmForm.city} className="w-full bg-blue-500 text-white py-3 rounded-2xl font-bold disabled:bg-gray-300">{t.submitPharmacy}</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );

  // ===================== REGISTER =====================
  if (screen === 'register') return (
    <div className="min-h-screen bg-gradient-to-br from-green-600 to-green-800 flex items-center justify-center p-6">
      <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
        <div className="text-center mb-6">
          <div className="text-5xl mb-3">📝</div>
          <h1 className="text-2xl font-bold text-gray-800">{t.register}</h1>
        </div>
        {registerError && <div className="bg-red-50 text-red-600 p-3 rounded-xl mb-4 text-sm">{registerError}</div>}
        <div className="space-y-3">
          <input type="text" placeholder={`${t.fullName} *`} value={registerForm.name} onChange={e=>setRegisterForm({...registerForm,name:e.target.value})} className="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400" />
          <input type="email" placeholder={`${t.email} *`} value={registerForm.email} onChange={e=>setRegisterForm({...registerForm,email:e.target.value})} className="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400" />
          <input type="tel" placeholder={`${t.phone} * (ex: 237 6XX XX XX XX)`} value={registerForm.phone} onChange={e=>setRegisterForm({...registerForm,phone:e.target.value})} className="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400" />
          <select value={registerForm.city} onChange={e=>setRegisterForm({...registerForm,city:e.target.value})} className="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400">
            <option value="">{t.chooseCity}</option>
            {CITIES.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <input type="password" placeholder={`${t.password} *`} value={registerForm.password} onChange={e=>setRegisterForm({...registerForm,password:e.target.value})} className="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400" />
          <input type="password" placeholder={`${t.confirmPassword} *`} value={registerForm.confirm} onChange={e=>setRegisterForm({...registerForm,confirm:e.target.value})} className="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-green-400" />
          <button onClick={handleRegister} className="w-full bg-green-500 text-white py-4 rounded-2xl font-bold text-lg">{t.register}</button>
        </div>
        <p className="text-center mt-4 text-gray-600 text-sm">{t.hasAccount} <button onClick={()=>{setScreen('login');setRegisterError('');}} className="text-green-600 font-bold">{t.login}</button></p>
      </div>
    </div>
  );

  // ===================== MAIN APP =====================
  return (
    <div className="max-w-lg mx-auto bg-gray-50 min-h-screen relative overflow-hidden">
      {menuOpen && <div className="fixed inset-0 bg-black bg-opacity-50 z-40" onClick={()=>setMenuOpen(false)} />}

      {/* MENU LATERAL */}
      <div className={`fixed top-0 left-0 h-full w-72 bg-green-800 z-50 shadow-2xl slide-menu ${menuOpen?'translate-x-0':'-translate-x-full'}`}>
        <div className="bg-green-900 p-6 pt-12">
          <div className="flex items-center mb-2">
            <div className="bg-white rounded-full w-14 h-14 flex items-center justify-center text-2xl mr-3">👤</div>
            <div>
              <p className="text-white font-bold">{user?.name}</p>
              <p className="text-green-300 text-sm">{user?.city || 'Cameroun 🇨🇲'}</p>
              <p className="text-green-300 text-xs">{user?.phone}</p>
            </div>
          </div>
        </div>
        <div className="p-4 space-y-1 overflow-y-auto">
          {[
            {icon:'🏠',label:t.home,p:'home'},
            {icon:'🗺️',label:t.pharmacies,p:'pharmacies'},
            {icon:'🛒',label:t.cart,p:'cart'},
            {icon:'🔔',label:t.reminders,p:'reminders'},
            {icon:'👤',label:t.profile,p:'profile'},
            {icon:'⚙️',label:t.settings,p:'settings'},
            {icon:'🏥',label:t.registerPharmacy,p:'register-pharmacy'},
          ].map((item,i)=>(

                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">{t.startDate} *</label>
                  <input type="date" value={newReminder.startDate} onChange={e=>setNewReminder({...newReminder,startDate:e.target.value})} className="w-full p-3 border rounded-xl outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-2">{t.endDate} *</label>
                  <input type="date" value={newReminder.endDate} onChange={e=>setNewReminder({...newReminder,endDate:e.target.value})} className="w-full p-3 border rounded-xl outline-none" />
                </div>
              </div>
              <textarea placeholder={t.notes} value={newReminder.notes} onChange={e=>setNewReminder({...newReminder,notes:e.target.value})} rows="2" className="w-full p-3 border rounded-xl outline-none resize-none" />
              <button onClick={addReminder} disabled={!newReminder.name||!newReminder.startDate||!newReminder.endDate||newReminder.days.length===0} className="w-full bg-purple-500 text-white py-4 rounded-2xl font-bold disabled:bg-gray-300">{t.createReminder}</button>
            </div>
          </div>
        </div>
      )}

      {/* BOTTOM NAV */}
      <div className="fixed bottom-0 left-0 right-0 max-w-lg mx-auto bg-white border-t shadow-lg z-30">
        <div className="flex justify-around py-2">
          {[
            {icon:'🏠',label:t.home,p:'home'},
            {icon:'🗺️',label:t.pharmacies,p:'pharmacies'},
            {icon:'🛒',label:t.cart,p:'cart'},
            {icon:'🔔',label:t.reminders,p:'reminders'},
            {icon:'⚙️',label:t.settings,p:'settings'},
          ].map(item=>(
            <button key={item.p} onClick={()=>navigate(item.p)} className={`flex flex-col items-center p-2 ${page===item.p?'text-green-600':'text-gray-400'}`}>
              <span className="text-xl">{item.icon}</span>
              <span className="text-xs mt-1">{item.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
