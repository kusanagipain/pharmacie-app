<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <meta name="description" content="Application mobile pour commander vos produits pharmaceutiques">
    <title>Pharmacie App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React et ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone pour JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #root {
            width: 100%;
            min-height: 100vh;
        }
        
        /* Empêcher le zoom sur les inputs sur iOS */
        input, select, textarea {
            font-size: 16px !important;
        }
        
        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }
    </style>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json;base64,ewogICJzaG9ydF9uYW1lIjogIlBoYXJtYWNpZSIsCiAgIm5hbWUiOiAiQXBwbGljYXRpb24gUGhhcm1hY2llIE1vYmlsZSIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImRhdGE6aW1hZ2UvcG5nO2Jhc2U2NCxpVkJPUncwS0dnb0FBQUFOU1VoRVVnQUFBQkFBQUFBUUNBWUFBQUFmOC85aEFBQUFCSE5DU1ZRSUNBZ0lmQWhraUFBQUFBbHdTRmx6QUFBTEVnQUFDeEliOG5pekFBQUFBWFJTVGxNQVFPYllaZ0FBQURGSlJFRlVlTnA4a01FTmdBQU1BNERTUUFBQUFCSkpSVTVFcmtKZ2dnPT0iLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciLAogICAgICAic2l6ZXMiOiAiMTkyeDE5MiIKICAgIH0KICBdLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgInRoZW1lX2NvbG9yIjogIiMxMGI5ODEiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNmZmZmZmYiCn0=">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Import icons from Lucide
        const Search = () => <i data-lucide="search"></i>;
        const MapPin = () => <i data-lucide="map-pin"></i>;
        const ShoppingCart = () => <i data-lucide="shopping-cart"></i>;
        const Bell = () => <i data-lucide="bell"></i>;
        const Home = () => <i data-lucide="home"></i>;
        const User = () => <i data-lucide="user"></i>;
        const Clock = () => <i data-lucide="clock"></i>;
        const Phone = () => <i data-lucide="phone"></i>;
        const Star = () => <i data-lucide="star"></i>;
        const Plus = () => <i data-lucide="plus"></i>;
        const Minus = () => <i data-lucide="minus"></i>;
        const X = () => <i data-lucide="x"></i>;
        const Calendar = () => <i data-lucide="calendar"></i>;
        const Repeat = () => <i data-lucide="repeat"></i>;
        const Edit2 = () => <i data-lucide="edit-2"></i>;
        const Trash2 = () => <i data-lucide="trash-2"></i>;
        const AlertCircle = () => <i data-lucide="alert-circle"></i>;

        const PharmacyApp = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [searchQuery, setSearchQuery] = useState('');
            const [cart, setCart] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [reminders, setReminders] = useState([
                { 
                    id: 1, 
                    name: 'Doliprane 1000mg', 
                    dosage: '1 comprimé',
                    times: ['08:00', '14:00', '20:00'],
                    days: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
                    startDate: '2025-11-02',
                    endDate: '2025-11-16',
                    frequency: 'Quotidien',
                    notes: 'Prendre pendant les repas',
                    active: true
                }
            ]);
            const [showAddReminder, setShowAddReminder] = useState(false);
            const [editingReminder, setEditingReminder] = useState(null);
            
            const products = [
                { id: 1, name: 'Doliprane 1000mg', category: 'Antidouleur', price: 3.50, image: '💊' },
                { id: 2, name: 'Ibuprofène 400mg', category: 'Anti-inflammatoire', price: 4.20, image: '💊' },
                { id: 3, name: 'Vitamine C 1000mg', category: 'Vitamines', price: 8.90, image: '🍊' },
                { id: 4, name: 'Sirop contre la toux', category: 'Respiratoire', price: 6.50, image: '🍯' },
            ];

            // Initialize Lucide icons
            useEffect(() => {
                lucide.createIcons();
            }, [currentPage, showAddReminder, editingReminder, selectedProduct]);

            const addToCart = (product) => {
                const existingItem = cart.find(item => item.id === product.id);
                if (existingItem) {
                    setCart(cart.map(item =>
                        item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                    ));
                } else {
                    setCart([...cart, { ...product, quantity: 1 }]);
                }
            };

            const totalCart = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const cartItemsCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            return (
                <div className="max-w-2xl mx-auto bg-gray-50 min-h-screen">
                    {/* Page d'accueil simplifiée */}
                    {currentPage === 'home' && (
                        <div className="pb-20">
                            <div className="bg-gradient-to-r from-green-500 to-green-600 text-white p-6 rounded-b-3xl">
                                <h1 className="text-2xl font-bold mb-2">Bonjour ! 👋</h1>
                                <p className="text-green-100">Trouvez vos produits pharmaceutiques</p>
                            </div>

                            <div className="p-4">
                                <h2 className="text-xl font-bold mb-4 text-gray-800">Produits populaires</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {products.map(product => (
                                        <div key={product.id} className="bg-white rounded-2xl p-4 shadow-sm">
                                            <div className="text-4xl mb-2">{product.image}</div>
                                            <div className="text-sm font-semibold text-gray-800 mb-1">{product.name}</div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-green-600 font-bold">{product.price.toFixed(2)}€</span>
                                                <button
                                                    onClick={() => addToCart(product)}
                                                    className="bg-green-500 text-white p-2 rounded-full hover:bg-green-600"
                                                >
                                                    <Plus />
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Panier */}
                    {currentPage === 'cart' && (
                        <div className="pb-20">
                            <div className="bg-gradient-to-r from-green-500 to-green-600 text-white p-6">
                                <h1 className="text-2xl font-bold mb-2">Mon panier</h1>
                                <p className="text-green-100">{cartItemsCount} article(s)</p>
                            </div>
                            <div className="p-4">
                                {cart.length === 0 ? (
                                    <div className="text-center py-12">
                                        <p className="text-gray-500">Votre panier est vide</p>
                                    </div>
                                ) : (
                                    <>
                                        {cart.map(item => (
                                            <div key={item.id} className="bg-white rounded-2xl p-4 shadow-sm mb-4">
                                                <div className="flex items-center justify-between">
                                                    <div>
                                                        <h3 className="font-semibold">{item.name}</h3>
                                                        <p className="text-green-600 font-bold">{item.price.toFixed(2)}€</p>
                                                    </div>
                                                    <span className="font-semibold">x{item.quantity}</span>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="bg-white rounded-2xl p-4 shadow-sm mt-6">
                                            <div className="text-2xl font-bold text-green-600">Total: {totalCart.toFixed(2)}€</div>
                                        </div>
                                        <button className="w-full mt-6 bg-green-500 text-white py-4 rounded-full font-bold">
                                            Commander
                                        </button>
                                    </>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Rappels */}
                    {currentPage === 'reminders' && (
                        <div className="pb-20">
                            <div className="bg-gradient-to-r from-purple-500 to-purple-600 text-white p-6">
                                <h1 className="text-2xl font-bold mb-2">Mes rappels</h1>
                                <p className="text-purple-100">Ne manquez plus aucune prise</p>
                            </div>
                            <div className="p-4">
                                {reminders.map(reminder => (
                                    <div key={reminder.id} className="bg-white rounded-2xl p-4 shadow-sm mb-4">
                                        <h3 className="font-bold text-lg mb-2">{reminder.name}</h3>
                                        <p className="text-sm text-gray-600 mb-2">{reminder.dosage}</p>
                                        <p className="text-sm text-gray-600">
                                            <span className="font-semibold">Horaires:</span> {reminder.times.join(' • ')}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Navigation bar */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t max-w-2xl mx-auto">
                        <div className="flex justify-around items-center p-2">
                            <button
                                onClick={() => setCurrentPage('home')}
                                className={`flex flex-col items-center p-2 ${currentPage === 'home' ? 'text-green-500' : 'text-gray-400'}`}
                            >
                                <Home />
                                <span className="text-xs mt-1">Accueil</span>
                            </button>
                            <button
                                onClick={() => setCurrentPage('cart')}
                                className={`flex flex-col items-center p-2 relative ${currentPage === 'cart' ? 'text-green-500' : 'text-gray-400'}`}
                            >
                                <ShoppingCart />
                                {cartItemsCount > 0 && (
                                    <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">
                                        {cartItemsCount}
                                    </span>
                                )}
                                <span className="text-xs mt-1">Panier</span>
                            </button>
                            <button
                                onClick={() => setCurrentPage('reminders')}
                                className={`flex flex-col items-center p-2 ${currentPage === 'reminders' ? 'text-green-500' : 'text-gray-400'}`}
                            >
                                <Bell />
                                <span className="text-xs mt-1">Rappels</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PharmacyApp />);
    </script>
</body>
</html>
